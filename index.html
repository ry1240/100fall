/* タイトル */

}
.title-wrapper a{

  font-weight: bold;
  text-decoration: underline;
}
.pie-wrapper{
  position: relative;
  width: 30px;
  height: 30px;
  margin: 0 auto;
}

.percentage-text{
  position: absolute;
  top: 180%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 25px;
  font-weight: bold;
}

.section{
  margin-top: 50px;
}
.subsection{
  border-bottom: 1px solid #000;
  padding-bottom: 12px;
  margin-bottom: 12px;
}

.subsection:last-child{
  border-bottom: none;
}

.section-title{
  font-size: 22px;
  margin-bottom: 10px;
}

/* 青いライン */
.section-line{
  height: 6px;
  background: linear-gradient(to right,#1f5f9b 0%,#5ba9d9 100%);
  margin-bottom: 25px;
}

/* 2列レイアウト */
.list{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 50px;
}

.pref-title {
  margin-bottom: 0px;
  font-weight: bold;
  font-size: 13px
}

.items{
  display: flex;
  flex-wrap: wrap;
  margin-bottom: 8px;
  gap: 100px;
  align-items: center;
}
/* 各項目 */
.item{
  display: flex;
  flex-wrap: wrap;
  margin-bottom: 8px;

}

/* 丸アイコン */
.circle{
  width: 8px;
  height: 8px;
  border: 2px solid #555;
  border-radius: 50%;
  margin-right: 8px;
}

.circle.active{
  background: #333;
}

.rakusa{
  font-size: 11px;
  color: black;   
  margin-left: 5px;
  margin-right: 6px;
  vertical-align: sub;
  align-self: flex-end;
}
.date{

}
/* リンク */
a{
  color: #333;
  text-decoration: none;
}
a:hover{
  text-decoration: underline;
}

.place{
  color: #555;
  margin-left: 5px;

          <span class="date">${w.date ?  w.date : ""}</span>
