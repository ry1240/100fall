.circle{
  position: relative;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  border: 2px solid #555;
  margin-right: 8px;
}

/* active時の内側 */
.circle.active{
  background: #fff;
}

/* 外側リング（10pxで囲む） */
.circle.active::after{
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 2px solid #333;
  transform: translate(-50%, -50%);
}
.circle.none{
  display: none;
}

/* リンク */
a{

  text-decoration: none;
}
a:hover{

  ]}
};

// =====================
// 自動生成処理
// =====================

const container = document.getElementById("container");

for (const region in waterfalls) {

  const section = document.createElement("div");
  section.className = "section";

  section.innerHTML = `
    <div class="section-title">${region}</div>
    <div class="section-line"></div>
  `;

  for (const pref in waterfalls[region]) {

    const sub = document.createElement("div");
    sub.className = "subsection";

    let html = `
      <div class="subsection-title">${pref}</div>
      <div class="list">
    `;

    waterfalls[region][pref].forEach(w => {
      html += `
        <div class="item">
          <div class="circle ${w.state || ""}"></div>
          <a href="${w.url}" target="_blank" rel="noopener noreferrer">${w.name}</a>
          <span class="rakusa">${w.height}</span>
          <span class="date">${w.date ?  w.date : ""}</span>
           <span class="memo-bubble">${w.memo ? w.memo : ""}</span>
        </div>
      `;
    });

    html += "</div>";
    sub.innerHTML = html;
    section.appendChild(sub);
  }

  container.appendChild(section);
}
</script>
