.switch input{

}

.slider{
  position: absolute;
  inset: 0;
  background: #ccc;
  border-radius: 999px;
  cursor: pointer;
  transition: 0.25s;
}

.slider::before{
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  left: 3px;
  top: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.25s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.25);
}

.switch input:checked + .slider{
  background: #1976d2;
}

.switch input:checked + .slider::before{
  transform: translateX(20px);
}

/* active時の内側 */

  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 10px;
  height: 10px;
  border-radius: 50%;

const container = document.getElementById("container");

for (const region in waterfalls) {

  const section = document.createElement("div");
  section.className = "section";

  section.innerHTML = `
    <div class="section-title">${region}</div>
    <div class="section-line"></div>
  `;

  for (const pref in waterfalls[region]) {

    const sub = document.createElement("div");
    sub.className = "subsection";

    let html = `
      <div class="subsection-title">${pref}</div>
      <div class="list">
    `;

    waterfalls[region][pref].forEach(w => {
      html += `
        <div class="item">
          <div class="circle ${w.state || ""}"></div>
          <a href="${w.url}" target="_blank" rel="noopener noreferrer">${w.name}</a>
          <span class="rakusa">${w.height}</span>
          <span class="date">${w.date ?  w.date : ""}</span>
          ${w.memo ? `<span class="memo">${w.memo}</span>` : ""}
          </div>
      `;
    });

    html += "</div>";
    sub.innerHTML = html;
    section.appendChild(sub);
  }

  container.appendChild(section);
}
